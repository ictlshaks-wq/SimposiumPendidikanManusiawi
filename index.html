<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <title>Majlis Perasmian</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .container {
      width: 92%;
      max-width: 850px;
      background: rgba(255,255,255,0.12);
      padding: 30px;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 34px;
      margin-bottom: 5px;
    }

    h2 {
      font-size: 20px;
      font-weight: normal;
      margin-top: 0;
      color: #dbeafe;
    }

    .signature-box {
      background: white;
      border-radius: 18px;
      padding: 15px;
      margin-top: 25px;
    }

    canvas {
      width: 100%;
      height: 300px;
      background: white;
      border-radius: 12px;
      touch-action: none;
      cursor: crosshair;
    }

    .status {
      margin-top: 20px;
      font-size: 22px;
      font-weight: bold;
      color: #fef3c7;
    }

    .timer {
      margin-top: 8px;
      font-size: 18px;
      color: #bfdbfe;
    }

    .button-row {
      margin-top: 22px;
    }

    button {
      padding: 15px 28px;
      margin: 8px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
    }

    .reset {
      background: #f97316;
      color: white;
    }

    .test {
      background: #16a34a;
      color: white;
    }

    .ip-input {
      margin-top: 18px;
      padding: 10px;
      width: 230px;
      border-radius: 8px;
      border: none;
      text-align: center;
      font-size: 16px;
    }

    .note {
      font-size: 14px;
      color: #dbeafe;
      margin-top: 15px;
      line-height: 1.5;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Majlis Perasmian</h1>
    <h2>Sila tandatangan pada ruang di bawah</h2>

    <input class="ip-input" id="ip" value="192.168.201.131">

    <div class="signature-box">
      <canvas id="signatureCanvas"></canvas>
    </div>

    <div class="status" id="status">Status: Menunggu tandatangan perasmi</div>
    <div class="timer" id="timer">Lampu akan menyala selepas 5 saat tandatangan dimulakan</div>

    <div class="button-row">
      <button class="reset" onclick="resetMajlis()">RESET</button>
      <button class="test" onclick="hidupkanLampu()">TEST LAMPU</button>
    </div>

    <div class="note">
      Pastikan peranti ini dan ESP32 berada pada WiFi yang sama.<br>
      IP ESP32 boleh ditukar pada kotak di atas jika berubah.
    </div>
  </div>

  <script>
    const canvas = document.getElementById("signatureCanvas");
    const ctx = canvas.getContext("2d");
    const statusText = document.getElementById("status");
    const timerText = document.getElementById("timer");

    let isDrawing = false;
    let sudahMula = false;
    let sudahSelesai = false;
    let countdownInterval;
    let masaBaki = 5;

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;

      ctx.lineWidth = 4;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = "#111827";
    }

    window.addEventListener("load", resizeCanvas);
    window.addEventListener("resize", resizeCanvas);

    function getPosition(e) {
      const rect = canvas.getBoundingClientRect();

      if (e.touches && e.touches.length > 0) {
        return {
          x: e.touches[0].clientX - rect.left,
          y: e.touches[0].clientY - rect.top
        };
      }

      return {
        x: e.clientX - rect.left,
        y: e.clientY - rect.top
      };
    }

    function mulaTandatangan(e) {
      e.preventDefault();

      if (sudahSelesai) return;

      isDrawing = true;
      const pos = getPosition(e);

      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);

      if (!sudahMula) {
        sudahMula = true;
        mulaKiraanDetik();
      }
    }

    function tulisTandatangan(e) {
      e.preventDefault();

      if (!isDrawing || sudahSelesai) return;

      const pos = getPosition(e);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    }

    function tamatTandatangan(e) {
      e.preventDefault();
      isDrawing = false;
    }

    canvas.addEventListener("mousedown", mulaTandatangan);
    canvas.addEventListener("mousemove", tulisTandatangan);
    canvas.addEventListener("mouseup", tamatTandatangan);
    canvas.addEventListener("mouseleave", tamatTandatangan);

    canvas.addEventListener("touchstart", mulaTandatangan);
    canvas.addEventListener("touchmove", tulisTandatangan);
    canvas.addEventListener("touchend", tamatTandatangan);

    function mulaKiraanDetik() {
      masaBaki = 5;
      statusText.innerText = "Status: Tandatangan sedang direkodkan";
      timerText.innerText = "Lampu akan menyala dalam " + masaBaki + " saat";

      countdownInterval = setInterval(() => {
        masaBaki--;
        timerText.innerText = "Lampu akan menyala dalam " + masaBaki + " saat";

        if (masaBaki <= 0) {
          clearInterval(countdownInterval);
          selesaiPerasmian();
        }
      }, 1000);
    }

    function selesaiPerasmian() {
      if (sudahSelesai) return;

      sudahSelesai = true;
      statusText.innerText = "Status: Perasmian selesai";
      timerText.innerText = "Lampu sedang dihidupkan...";

      hidupkanLampu();
      ucapTerimaKasih();
    }

    function hidupkanLampu() {
      const ip = document.getElementById("ip").value.trim();
      const url = "http://" + ip + "/on";

      fetch(url)
        .then(response => response.text())
        .then(data => {
          timerText.innerText = "Lampu telah menyala";
        })
        .catch(error => {
          timerText.innerText = "Gagal hantar arahan. Cuba buka terus: " + url;
          window.open(url, "_blank");
        });
    }

    function ucapTerimaKasih() {
      const teks = "Terima kasih. Majlis perasmian telah disempurnakan.";

      const suara = new SpeechSynthesisUtterance(teks);
      suara.lang = "ms-MY";
      suara.rate = 0.9;
      suara.pitch = 1;

      speechSynthesis.cancel();
      speechSynthesis.speak(suara);
    }

    function resetMajlis() {
      clearInterval(countdownInterval);

      sudahMula = false;
      sudahSelesai = false;
      isDrawing = false;
      masaBaki = 5;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      statusText.innerText = "Status: Menunggu tandatangan perasmi";
      timerText.innerText = "Lampu akan menyala selepas 5 saat tandatangan dimulakan";

      const ip = document.getElementById("ip").value.trim();
      fetch("http://" + ip + "/off").catch(() => {});
    }
  </script>

</body>
</html>
