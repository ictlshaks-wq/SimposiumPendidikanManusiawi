<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <title>Kawalan LED ESP32</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #dbeafe, #f8fafc);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .card {
      width: 90%;
      max-width: 420px;
      background: white;
      padding: 30px;
      border-radius: 24px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.15);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
      color: #0f172a;
    }

    .status {
      font-size: 18px;
      margin: 20px 0;
      color: #334155;
      font-weight: bold;
    }

    button {
      width: 100%;
      padding: 20px;
      margin: 10px 0;
      font-size: 22px;
      font-weight: bold;
      border: none;
      border-radius: 16px;
      color: white;
      cursor: pointer;
    }

    .on {
      background: #16a34a;
    }

    .off {
      background: #dc2626;
    }

    .ipbox {
      width: 92%;
      padding: 12px;
      font-size: 16px;
      text-align: center;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      margin-bottom: 15px;
    }

    .small {
      font-size: 13px;
      color: #64748b;
      line-height: 1.5;
      margin-top: 18px;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Kawalan LED ESP32</h1>

    <input class="ipbox" id="ip" value="192.168.201.131">

    <div class="status" id="status">Status: Sedia</div>

    <button class="on" onclick="kawalLED('on')">HIDUPKAN LED</button>
    <button class="off" onclick="kawalLED('off')">MATIKAN LED</button>

    <div class="small">
      Pastikan telefon/laptop dan ESP32 berada pada WiFi yang sama.<br>
      Guna alamat IP ESP32 yang keluar dalam Serial Monitor.
    </div>
  </div>

  <script>
    function kawalLED(arahan) {
      const ip = document.getElementById("ip").value.trim();
      const url = "http://" + ip + "/" + arahan;

      document.getElementById("status").innerText = "Menghantar arahan: " + arahan.toUpperCase();

      fetch(url)
        .then(response => response.text())
        .then(data => {
          document.getElementById("status").innerText = "Status: " + data;
        })
        .catch(error => {
          document.getElementById("status").innerText =
            "Gagal. Cuba buka terus: " + url;

          window.open(url, "_blank");
        });
    }
  </script>

</body>
</html>
